# CodeBuild BuildSpec for Build Stage
# 
# Performs:
# - Install Node.js 24 dependencies
# - Compile TypeScript
# - Run unit tests with coverage
# - Run property tests
# - Package Lambda function
# - Synthesize CDK templates
#
# **Validates: Requirements 12.3, 13.9**

version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 24
    commands:
      - echo "Installing dependencies..."
      - npm ci
      - npm install -g aws-cdk
      
  pre_build:
    commands:
      - echo "Compiling TypeScript and running type checks..."
      - npm run build
      
  build:
    commands:
      - echo "Running all tests with coverage..."
      - npm test -- --coverage --coverageReporters=text --coverageReporters=lcov
      
  post_build:
    commands:
      - echo "Packaging Lambda function..."
      - mkdir -p dist
      - cp -r src dist/
      - cp -r node_modules dist/
      - cp package.json dist/
      - cd dist && zip -r ../lambda-package.zip . -x "*.test.*" "*.spec.*" && cd ..
      - echo "Uploading Lambda package to S3..."
      - aws s3 cp lambda-package.zip s3://iot-proximity-pipeline-artifacts-$AWS_ACCOUNT_ID/lambda-code/lambda-package.zip
      - echo "Synthesizing CDK templates for acceptance..."
      - cdk synth --all -c environment=acceptance --output cdk.out.acceptance
      - echo "Synthesizing CDK templates for production..."
      - cdk synth --all -c environment=production --output cdk.out.production
      - echo "Organizing CDK outputs..."
      - mkdir -p cdk.out
      - cp -r cdk.out.acceptance/* cdk.out/
      - cp -r cdk.out.production/* cdk.out/
      - echo "Build completed successfully"

artifacts:
  files:
    - '**/*'
  secondary-artifacts:
    BuildOutput:
      files:
        - lambda-package.zip
        - dist/**/*
      name: BuildOutput
    CdkOutput:
      files:
        - cdk.out/**/*
      name: CdkOutput

reports:
  test-reports:
    files:
      - 'coverage/lcov.info'
    file-format: 'CLOVERXML'
    base-directory: 'coverage'

cache:
  paths:
    - 'node_modules/**/*'
